name: Bug report
description: Report a reproducible problem in vala-testcases
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue.
        Please include enough detail so we can reproduce it.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the problem
      placeholder: Test registration fails for a custom BaseTest
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide exact commands or code snippets
      placeholder: |
        1. Create a test class extending BaseTest...
        2. Register suite via register_test_suite<T>()...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Vala version, GLib version
      placeholder: Fedora 42, valac 0.56.x, glib 2.88.x
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      render: shell
