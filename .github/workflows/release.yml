name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync meson.build version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(sed -nE "s/^project\('vala-testcases', 'vala', 'c', version: '([^']+)'\)/\1/p" meson.build)"

          if [ -z "${FILE_VERSION}" ]; then
            echo "::warning::Unable to read project version from meson.build"
            exit 0
          fi

          if [ "${FILE_VERSION}" != "${TAG_VERSION}" ]; then
            sed -i -E "s/(project\('vala-testcases', 'vala', 'c', version: ')[^']+('\))/\1${TAG_VERSION}\2/" meson.build
            echo "Updated meson.build version: ${FILE_VERSION} -> ${TAG_VERSION}"
          else
            echo "meson.build already matches tag version: ${TAG_VERSION}"
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            valac \
            pkg-config \
            libglib2.0-dev \
            libgee-0.8-dev

      - name: Configure release build
        run: meson setup build-release --buildtype=release

      - name: Build release
        run: meson compile -C build-release

      - name: Run tests
        run: meson test -C build-release --print-errorlogs

      - name: Create release bundle
        run: |
          mkdir -p dist
          cp -a build-release/src/libvala_testcases.so* dist/
          cp build-release/src/vapi/vala_testcases.vapi dist/
          cp build-release/src/vala_testcases.h dist/
          (cd dist && zip -r ../vala-testcases-${GITHUB_REF_NAME}-linux.zip .)

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vala-testcases-linux
          if-no-files-found: warn
          path: |
            build-release/src/libvala_testcases.so*
            build-release/src/vapi/vala_testcases.vapi
            build-release/src/vala_testcases.h
            vala-testcases-${{ github.ref_name }}-linux.zip

      - name: Generate release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREVIOUS_TAG="$(git tag --sort=-creatordate | grep -v "^${CURRENT_TAG}$" | head -n 1 || true)"

          {
            echo
            echo "## Changes"
            echo

            if [ -n "${PREVIOUS_TAG}" ]; then
              echo "Changes since ${PREVIOUS_TAG}:"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${PREVIOUS_TAG}..${CURRENT_TAG}" || true
            else
              echo "Initial release changes:"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${CURRENT_TAG}" || true
            fi
            echo
          } > RELEASE_NOTES.md

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            build-release/src/libvala_testcases.so*
            build-release/src/vapi/vala_testcases.vapi
            build-release/src/vala_testcases.h
            vala-testcases-${{ github.ref_name }}-linux.zip

      - name: Persist meson.build version to default branch
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if git show-ref --verify --quiet refs/remotes/origin/main; then
            DEFAULT_BRANCH="main"
          else
            DEFAULT_BRANCH="master"
          fi

          git fetch origin "${DEFAULT_BRANCH}" --depth=1
          git checkout "${DEFAULT_BRANCH}"

          sed -i -E "s/(project\('vala-testcases', 'vala', 'c', version: ')[^']+('\))/\1${TAG_VERSION}\2/" meson.build

          if git diff --quiet -- meson.build; then
            echo "No version commit needed on ${DEFAULT_BRANCH}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add meson.build
          git commit -m "chore(release): bump meson version to ${TAG_VERSION}"

          if ! git push origin "HEAD:${DEFAULT_BRANCH}"; then
            echo "::warning::Failed to push version bump commit to ${DEFAULT_BRANCH}."
            echo "::warning::Please push meson.build version update manually."
          fi
